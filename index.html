<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حسابات المحل</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #333);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .container {
            background: #222;
            padding: 70px;
            width: 100%;
            max-width: 750px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .logo {
            width: 180px;
            height: 180px;
            background-image: url('logo.jpeg'); /* ← اللوقو الجديد */
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            margin: auto;
            margin-bottom: 40px;
        }

        h2 {
            margin-bottom: 45px;
            font-size: 34px;
            font-weight: 700;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 22px 0;
            padding: 28px;
            border-radius: 22px;
            text-decoration: none;
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            transition: 0.2s;
        }

        .btn img {
            width: 50px;
            height: 50px;
        }

        .btn:hover {
            transform: scale(1.07);
            opacity: 0.9;
        }

        .snap { background: #FFFC00; color: #000; }
        .tiktok { background: #000; border: 3px solid #ff0050; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        @media (max-width: 480px) {
            .container {
                padding: 60px;
                max-width: 95%;
            }

            .btn {
                padding: 30px;
                font-size: 27px;
            }

            .btn img {
                width: 52px;
                height: 52px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo"></div>

    <h2> MsMr </h2>

    <a class="btn snap" href="https://snapchat.com/t/1CJwglDl" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/000000/snapchat.png">
        سناب شات
    </a>

    <a class="btn tiktok" href="https://www.tiktok.com/@msmr.ksa?_r=1&_t=ZS-95hhZUi6Tll" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png">
        تيك توك
    </a>

    <a class="btn insta" href="https://www.instagram.com/msmr.ksa?igsh=a2FudHJuMmcwcjlu&utm_source=qr" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png">
        إنستغرام
    </a>

</div>

</body>
</html>
