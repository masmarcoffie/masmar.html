<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حسابات المحل</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #333);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .container {
            background: #222;
            padding: 50px; /* أكبر */
            width: 100%; /* ياخذ الشاشة كاملة */
            max-width: 650px; /* أعرض بكثير */
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 0 35px rgba(0,0,0,0.55);
        }

        .logo {
            width: 150px;
            height: 150px;
            background: #444;
            border-radius: 50%;
            margin: auto;
            margin-bottom: 30px;
            background-size: cover;
            background-position: center;
        }

        h2 {
            margin-bottom: 35px;
            font-size: 30px;
            font-weight: 700;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 18px 0;
            padding: 22px; /* أكبر */
            border-radius: 18px;
            text-decoration: none;
            color: #fff;
            font-size: 22px; /* أكبر */
            font-weight: 700;
            transition: 0.2s;
        }

        .btn img {
            width: 40px;
            height: 40px;
        }

        .btn:hover {
            transform: scale(1.06);
            opacity: 0.9;
        }

        .snap { background: #FFFC00; color: #000; }
        .tiktok { background: #000; border: 2px solid #ff0050; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        @media (max-width: 480px) {
            .container {
                padding: 45px;
                max-width: 95%;
            }

            .btn {
                padding: 24px;
                font-size: 23px;
            }

            .btn img {
                width: 42px;
                height: 42px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo" style="background-image: url('YOUR_LOGO.png');"></div>

    <h2> masmar   </h2>

    <a class="btn snap" href="https://snapchat.com/t/1CJwglDl" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/000000/snapchat.png">
        سناب شات
    </a>

    <a class="btn tiktok" href="https://www.tiktok.com/@msmr.ksa?_r=1&_t=ZS-95hhZUi6Tll" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png">
        تيك توك
    </a>

    <a class="btn insta" href="https://www.instagram.com/msmr.ksa?igsh=a2FudHJuMmcwcjlu&utm_source=qr" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png">
        إنستغرام
    </a>

</div>

</body>
</html>
