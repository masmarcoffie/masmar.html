<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حسابات المحل</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #333);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .container {
            background: #222;
            padding: 25px;
            width: 95%;
            max-width: 420px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        .logo {
            width: 100px;
            height: 100px;
            background: #444;
            border-radius: 50%;
            margin: auto;
            margin-bottom: 18px;
            background-size: cover;
            background-position: center;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 700;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .snap { background: #FFFC00; color: #000; }
        .tiktok { background: #000; border: 2px solid #ff0050; }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        .btn img {
            width: 26px;
            height: 26px;
        }

        /* تحسين إضافي للجوال */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 16px;
            }

            h2 {
                font-size: 20px;
            }

            .btn {
                padding: 12px;
                font-size: 16px;
            }

            .logo {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- شعار المحل (اختياري) -->
    <div class="logo" style="background-image: url('YOUR_LOGO.png');"></div>

    <h2>تابعونا على حسابات المحل</h2>

    <!-- سناب -->
    <a class="btn snap" href="https://snapchat.com/t/1CJwglDl" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/000000/snapchat.png">
        سناب شات
    </a>

    <!-- تيك توك -->
    <a class="btn tiktok" href="https://www.tiktok.com/@msmr.ksa?_r=1&_t=ZS-95hhZUi6Tll" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png">
        تيك توك
    </a>

    <!-- انستغرام -->
    <a class="btn insta" href="https://www.instagram.com/msmr.ksa?igsh=a2FudHJuMmcwcjlu&utm_source=qr" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png">
        إنستغرام
    </a>

</div>

</body>
</html>
