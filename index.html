<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابات المحل</title>

    <style>
        body {
            font-family: "Tajawal", sans-serif;
            text-align: center;
            background: #f7f7f7;
            padding: 20px;
        }

        .logo {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            background-size: cover;
            background-position: center;
            border-radius: 50%;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 24px;
        }

        .btn {
            display: block;
            width: 85%;
            max-width: 350px;
            margin: 12px auto;
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn img {
            width: 28px;
            vertical-align: middle;
            margin-left: 10px;
        }

        .snap { background: #fffc00; color: black; }
        .tiktok { background: #000000; }
        .insta { background: #d6249f; }
    </style>
</head>

<body>

    <!-- الشعار الجديد -->
    <div class="logo" style="background-image: url('logo2.png');"></div>

    <h2>تابعونا على حسابات المحل</h2>

    <!-- سناب -->
    <a class="btn snap" href="https://snapchat.com/t/1CJwglDl" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/000000/snapchat.png">
        سناب شات
    </a>

    <!-- تيك توك -->
    <a class="btn tiktok" href="https://www.tiktok.com/@msmr.ksa?_r=1&_t=ZS-95hhZUi6Tll" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png">
        تيك توك
    </a>

    <!-- انستغرام -->
    <a class="btn insta" href="https://www.instagram.com/msmr.ksa?igsh=a2FudHJuMmcwcjlu&utm_source=qr" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png">
        إنستغرام
    </a>

</body>
</html>
